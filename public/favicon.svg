<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Orange top half -->
  <rect width="32" height="17" fill="#FF8800"/>
  <!-- Blue bottom half -->
  <rect y="17" width="32" height="15" fill="#1155AA"/>
  <!-- Black divider -->
  <rect y="16" width="32" height="1.5" fill="#000"/>
  <!-- TOP label -->
  <text x="16" y="13" font-family="Arial Black, sans-serif" font-weight="900" font-size="11" fill="#000" text-anchor="middle" dominant-baseline="middle">TOP</text>
  <!-- POPS label -->
  <text x="16" y="25" font-family="Arial Black, sans-serif" font-weight="900" font-size="9" fill="#fff" text-anchor="middle" dominant-baseline="middle">POPS</text>
</svg>
