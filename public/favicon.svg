<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Yellow left bar -->
  <rect x="0" y="0" width="4" height="32" fill="#FFD700"/>
  <!-- Black line after left yellow -->
  <rect x="4" y="0" width="1.5" height="32" fill="#000"/>
  <!-- Yellow right bar -->
  <rect x="28" y="0" width="4" height="32" fill="#FFD700"/>
  <!-- Black line before right yellow -->
  <rect x="26.5" y="0" width="1.5" height="32" fill="#000"/>
  <!-- Orange top half -->
  <rect x="5.5" y="0" width="21" height="17" fill="#FF8800"/>
  <!-- Blue bottom half -->
  <rect x="5.5" y="17" width="21" height="15" fill="#1155AA"/>
  <!-- Black divider -->
  <rect x="5.5" y="16" width="21" height="1.5" fill="#000"/>
</svg>
